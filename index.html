<!DOCTYPE html>
<html>
<head>
    <title>EdgeMafia - Pure AI Mafia Game</title>
    <style>
        * { box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #0f0;
            font-family: 'Courier New', monospace;
            margin: 0;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        
        .hud {
            background: #000;
            border: 2px solid #0f0;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
        }
        
        .title-section {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 1px solid #0f0;
            padding-bottom: 10px;
        }
        
        .main-title {
            font-size: 48px;
            font-weight: bold;
            letter-spacing: 4px;
            color: #0f0;
            text-shadow: 0 0 10px #0f0;
        }
        
        .subtitle {
            font-size: 14px;
            color: #888;
            letter-spacing: 2px;
        }
        
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #333;
        }
        .stat {
            background: #111;
            padding: 8px 15px;
            border-radius: 5px;
        }
        .stat-label { color: #888; font-size: 12px; }
        .stat-value { font-size: 24px; font-weight: bold; }
        .mafia { color: #f00; }
        .town { color: #0f0; }
        
        .agent-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        .agent-table th, .agent-table td {
            padding: 8px;
            text-align: left;
            border-bottom: 1px solid #333;
        }
        .agent-table th { background: #111; color: #0f0; }
        .agent-table tr:hover { background: #111; }
        .dead { opacity: 0.4; }
        
        .trait-bar {
            width: 80px;
            height: 16px;
            background: #222;
            border-radius: 3px;
            overflow: hidden;
            display: inline-block;
        }
        .trait-fill {
            height: 100%;
            transition: width 0.2s;
        }
        .trait-fill.positive { background: #0f0; }
        .trait-fill.negative { background: #f00; }
        .trait-value { font-size: 11px; margin-left: 5px; }
        
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        button {
            background: #0f0;
            color: #000;
            border: none;
            padding: 10px 20px;
            font-family: monospace;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.2s ease;
        }
        button:hover { background: #0a0; transform: scale(1.02); }
        button:disabled {
            background: #333;
            color: #666;
            cursor: not-allowed;
            transform: none;
        }
        .nudge-group {
            background: #111;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
        }
        select, input {
            background: #222;
            color: #0f0;
            border: 1px solid #0f0;
            padding: 5px;
            font-family: monospace;
        }
        
        /* Canvas Graph Styles - SIMPLE AND RELIABLE */
        .graph-container {
            background: #0a0a0a;
            border: 2px solid #0f0;
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
        }
        
        .graph-title {
            color: #0f0;
            font-size: 14px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .graph-legend {
            display: flex;
            gap: 15px;
            font-size: 10px;
            flex-wrap: wrap;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 2px;
        }
        
        .legend-color.mafia { background: #ff0000; border: 1px solid #ff4444; }
        .legend-color.town { background: #00cc00; border: 1px solid #44ff44; }
        .legend-color.trust-high { background: #00ff00; }
        .legend-color.trust-low { background: #ff0000; }
        .legend-color.trust-mid { background: #ffff00; }
        
        #trustCanvas {
            background: #0a0a0a;
            border: 1px solid #0f0;
            border-radius: 5px;
            width: 100%;
            height: auto;
            cursor: pointer;
        }
        
        .graph-stats {
            margin-top: 10px;
            font-size: 11px;
            color: #666;
            text-align: center;
        }
        
        .status {
            position: fixed;
            top: 10px;
            right: 10px;
            background: #000;
            border: 1px solid #0f0;
            padding: 5px 10px;
            font-size: 12px;
            border-radius: 5px;
        }
        .connected { color: #0f0; }
        .disconnected { color: #f00; }
        
        .game-id-badge {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: #000;
            border: 1px solid #333;
            padding: 4px 8px;
            font-size: 10px;
            color: #666;
            border-radius: 5px;
            font-family: monospace;
        }
        
        .agent-count-badge {
            position: fixed;
            bottom: 10px;
            left: 10px;
            background: #000;
            border: 1px solid #333;
            padding: 4px 8px;
            font-size: 10px;
            color: #666;
            border-radius: 5px;
            font-family: monospace;
        }
        
        .toast {
            position: fixed;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            background: #0a0;
            color: #000;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            font-family: monospace;
            z-index: 1000;
            animation: fadeOut 2s ease forwards;
            pointer-events: none;
        }
        
        @keyframes fadeOut {
            0% { opacity: 1; bottom: 50px; }
            70% { opacity: 1; bottom: 60px; }
            100% { opacity: 0; bottom: 70px; visibility: hidden; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="hud">
        <div class="title-section">
            <div class="main-title">EDGEMAFIA</div>
            <div class="subtitle">by Aston Walker</div>
        </div>
        
        <div class="stats">
            <div class="stat">
                <div class="stat-label">CYCLE</div>
                <div class="stat-value" id="cycle">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">MAFIA</div>
                <div class="stat-value mafia" id="mafiaCount">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">TOWN</div>
                <div class="stat-value town" id="townCount">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">TOTAL</div>
                <div class="stat-value" id="totalCount">0</div>
            </div>
        </div>
        
        <div style="overflow-x: auto;">
            <table class="agent-table">
                <thead>
                    <tr><th>ID</th><th>NAME</th><th>ROLE</th><th>AGG</th><th>LOY</th><th>PAR</th><th>DEC</th><th>REWARD</th><th>NUDGE</th></tr>
                </thead>
                <tbody id="agentTable"></tbody>
            </table>
        </div>
        
        <!-- SIMPLE CANVAS GRAPH - NO D3.JS DEPENDENCIES -->
        <div class="graph-container" id="graphContainer" style="display: none;">
            <div class="graph-title">
                <span>🔗 SOCIAL NETWORK GRAPH (Trust Relationships)</span>
                <div class="graph-legend">
                    <div class="legend-item"><div class="legend-color mafia"></div><span>Mafia</span></div>
                    <div class="legend-item"><div class="legend-color town"></div><span>Town/Doctor/Detective</span></div>
                    <div class="legend-item"><div class="legend-color trust-high"></div><span>Trust &gt; 0.3</span></div>
                    <div class="legend-item"><div class="legend-color trust-mid"></div><span>Trust 0 to 0.3</span></div>
                    <div class="legend-item"><div class="legend-color trust-low"></div><span>Distrust &lt; 0</span></div>
                </div>
            </div>
            <canvas id="trustCanvas" width="1000" height="500" style="width:100%; height:auto; max-width:1000px; background:#0a0a0a;"></canvas>
            <div class="graph-stats" id="graphStats">Loading graph data...</div>
        </div>
        
        <div class="controls">
            <button id="nextCycleBtn">▶ NEXT CYCLE</button>
            <button id="newGameBtn">🔄 NEW GAME</button>
            <button id="toggleGraphBtn" style="background:#333;">📊 SHOW GRAPH</button>
        </div>
        
        <div class="nudge-group">
            <strong>NUDGE SELECTED AGENT:</strong>
            <select id="nudgeAgentSelect"></select>
            <select id="nudgeTraitSelect">
                <option value="aggression">Aggression</option>
                <option value="loyalty">Loyalty</option>
                <option value="paranoia">Paranoia</option>
                <option value="deceit">Deceit</option>
            </select>
            <button id="nudgeUpBtn">+0.1</button>
            <button id="nudgeDownBtn">-0.1</button>
        </div>
    </div>
</div>

<div class="status" id="status">
    <span class="disconnected">●</span> Disconnected
</div>
<div class="game-id-badge" id="gameIdBadge">Game: ---</div>
<div class="agent-count-badge" id="agentCountBadge">Agents: ---</div>

<script>
    let ws = null;
    let currentGameId = null;
    let currentAgentCount = 20;
    let agents = [];
    let gameOver = false;
    let currentWinner = null;
    let isResetting = false;
    let expectedNextGameId = null;
    
    // Graph state
    let graphVisible = false;
    let currentGraphData = { nodes: [], edges: [] };
    let canvasPositions = {}; // Store node positions for consistent layout
    
    function generateGameId() {
        const timestamp = Date.now();
        const random = Math.random().toString(36).substring(2, 8);
        return `game_${timestamp}_${random}`;
    }
    
    function showToast(message) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }
    
    function promptAgentCount() {
        let input = prompt('Number of AI agents per game (6-100):', '20');
        let count = parseInt(input);
        
        if (isNaN(count)) {
            count = 20;
        } else if (count < 6) {
            alert('Minimum 6 agents. Using 6.');
            count = 6;
        } else if (count > 100) {
            alert('Maximum 100 agents. Using 100.');
            count = 100;
        }
        
        return count;
    }
    
    // SIMPLE CANVAS GRAPH RENDERER - NO D3.JS
    function renderCanvasGraph(trustMatrix) {
        if (!graphVisible) return;
        
        const canvas = document.getElementById('trustCanvas');
        if (!canvas) return;
        
        // Get container width for responsive sizing
        const container = canvas.parentElement;
        const containerWidth = Math.min(container.clientWidth - 40, 1000);
        const width = containerWidth;
        const height = 500;
        
        canvas.width = width;
        canvas.height = height;
        
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, width, height);
        
        if (!trustMatrix || !trustMatrix.nodes || trustMatrix.nodes.length === 0) {
            document.getElementById('graphStats').textContent = 'No trust data available yet. Run a few cycles to build relationships.';
            return;
        }
        
        // Filter only alive nodes
        const aliveNodes = trustMatrix.nodes.filter(n => n.alive);
        const aliveNodeIds = new Set(aliveNodes.map(n => n.id));
        
        // Filter edges where both nodes are alive
        const validEdges = trustMatrix.edges.filter(e => 
            aliveNodeIds.has(e.source) && aliveNodeIds.has(e.target)
        );
        
        if (aliveNodes.length === 0) {
            document.getElementById('graphStats').textContent = 'No alive agents to display.';
            return;
        }
        
        // Calculate node positions in a circle layout (SIMPLE, RELIABLE)
        const centerX = width / 2;
        const centerY = height / 2;
        const radius = Math.min(width, height) * 0.35;
        
        // Store positions for this render
        const positions = {};
        aliveNodes.forEach((node, idx) => {
            const angle = (idx / aliveNodes.length) * Math.PI * 2;
            positions[node.id] = {
                x: centerX + Math.cos(angle) * radius,
                y: centerY + Math.sin(angle) * radius
            };
        });
        
        // Draw EDGES first (so they appear behind nodes)
        validEdges.forEach(edge => {
            const sourcePos = positions[edge.source];
            const targetPos = positions[edge.target];
            if (!sourcePos || !targetPos) return;
            
            // Set line color based on trust value
            if (edge.trust > 0.3) {
                ctx.strokeStyle = '#00ff00';  // Green = high trust
            } else if (edge.trust > 0) {
                ctx.strokeStyle = '#ffff00';  // Yellow = neutral trust
            } else {
                ctx.strokeStyle = '#ff0000';  // Red = distrust
            }
            
            // Line thickness based on trust magnitude
            const lineWidth = Math.max(1, Math.min(4, Math.abs(edge.trust) * 3));
            ctx.lineWidth = lineWidth;
            
            // Dashed line for negative trust
            if (edge.trust < 0) {
                ctx.setLineDash([5, 5]);
            } else {
                ctx.setLineDash([]);
            }
            
            ctx.beginPath();
            ctx.moveTo(sourcePos.x, sourcePos.y);
            ctx.lineTo(targetPos.x, targetPos.y);
            ctx.stroke();
        });
        
        // Reset line dash
        ctx.setLineDash([]);
        
        // Draw NODES
        aliveNodes.forEach(node => {
            const pos = positions[node.id];
            if (!pos) return;
            
            // Node radius: Mafia larger
            const radius = node.role === 0 ? 16 : 12;
            
            // Fill color based on role
            ctx.fillStyle = node.role === 0 ? '#800000' : '#006400';
            ctx.beginPath();
            ctx.arc(pos.x, pos.y, radius, 0, Math.PI * 2);
            ctx.fill();
            
            // Border: Mafia = red, Town = green
            ctx.strokeStyle = node.role === 0 ? '#ff0000' : '#00ff00';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(pos.x, pos.y, radius, 0, Math.PI * 2);
            ctx.stroke();
            
            // Agent ID label
            ctx.fillStyle = '#00ff00';
            ctx.font = 'bold 12px "Courier New", monospace';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(node.id.toString(), pos.x, pos.y);
            
            // Role indicator letter (M=mafia, D=detective, C=doctor, V=villager)
            let roleLetter = '';
            if (node.role === 0) roleLetter = 'M';
            else if (node.role === 2) roleLetter = 'Dc';
            else if (node.role === 3) roleLetter = 'Dt';
            else roleLetter = 'V';
            
            ctx.fillStyle = '#88ff88';
            ctx.font = 'bold 10px "Courier New", monospace';
            ctx.fillText(roleLetter, pos.x, pos.y + radius + 8);
            
            // Tooltip on hover (using canvas mousemove)
            canvas.title = `${node.name} (${node.roleName})\nAgg:${node.aggression.toFixed(2)} Loy:${node.loyalty.toFixed(2)}\nPar:${node.paranoia.toFixed(2)} Dec:${node.deceit.toFixed(2)}`;
        });
        
        // Draw edge labels (trust values on hover detection - simplified)
        canvas.onmousemove = (e) => {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const mouseX = (e.clientX - rect.left) * scaleX;
            const mouseY = (e.clientY - rect.top) * scaleY;
            
            // Check if hovering over an edge (simplified: check distance to line)
            let hoveredEdge = null;
            for (const edge of validEdges) {
                const sourcePos = positions[edge.source];
                const targetPos = positions[edge.target];
                if (!sourcePos || !targetPos) continue;
                
                // Calculate distance from point to line segment
                const Ax = sourcePos.x, Ay = sourcePos.y;
                const Bx = targetPos.x, By = targetPos.y;
                const Cx = mouseX, Cy = mouseY;
                
                const ABx = Bx - Ax, ABy = By - Ay;
                const ACx = Cx - Ax, ACy = Cy - Ay;
                const t = Math.max(0, Math.min(1, (ACx * ABx + ACy * ABy) / (ABx * ABx + ABy * ABy)));
                const closestX = Ax + t * ABx;
                const closestY = Ay + t * ABy;
                const dx = Cx - closestX, dy = Cy - closestY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < 8) {
                    hoveredEdge = edge;
                    break;
                }
            }
            
            if (hoveredEdge) {
                canvas.style.cursor = 'pointer';
                document.getElementById('graphStats').innerHTML = `🔗 Trust: ${hoveredEdge.trust.toFixed(3)} | Liking: ${hoveredEdge.liking.toFixed(3)}`;
            } else {
                canvas.style.cursor = 'default';
                const nodeCount = aliveNodes.length;
                const edgeCount = validEdges.length;
                document.getElementById('graphStats').innerHTML = `📊 ${nodeCount} agents | ${edgeCount} trust relationships | Hover over nodes or edges for details`;
            }
        };
        
        // Update stats display
        const mafiaCount = aliveNodes.filter(n => n.role === 0).length;
        const townCount = aliveNodes.length - mafiaCount;
        document.getElementById('graphStats').innerHTML = `🎭 ${mafiaCount} Mafia | ${townCount} Town | ${validEdges.length} trust connections | Hover for details`;
    }
    
    async function startNewGame() {
        if (isResetting) return;
        
        isResetting = true;
        
        const newAgentCount = promptAgentCount();
        if (newAgentCount === null) {
            isResetting = false;
            return;
        }
        
        currentAgentCount = newAgentCount;
        document.getElementById('agentCountBadge').textContent = `Agents: ${currentAgentCount}`;
        
        const uniqueGameId = generateGameId();
        expectedNextGameId = uniqueGameId;
        currentGameId = uniqueGameId;
        document.getElementById('gameIdBadge').textContent = `Game: ${uniqueGameId.substring(0, 20)}...`;
        
        gameOver = false;
        currentWinner = null;
        
        const nextBtn = document.getElementById('nextCycleBtn');
        nextBtn.disabled = false;
        nextBtn.style.opacity = '1';
        
        const nudgeUpBtn = document.getElementById('nudgeUpBtn');
        const nudgeDownBtn = document.getElementById('nudgeDownBtn');
        const nudgeAgentSelect = document.getElementById('nudgeAgentSelect');
        const nudgeTraitSelect = document.getElementById('nudgeTraitSelect');
        nudgeUpBtn.disabled = false;
        nudgeDownBtn.disabled = false;
        nudgeAgentSelect.disabled = false;
        nudgeTraitSelect.disabled = false;
        
        showToast('Starting fresh game...');
        
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ 
                type: 'join_game', 
                gameId: uniqueGameId, 
                createNew: true, 
                n: currentAgentCount
            }));
        } else {
            connect();
        }
        
        setTimeout(() => {
            isResetting = false;
        }, 1000);
    }
    
    function handleGameOver(winner) {
        if (gameOver) return;
        if (isResetting) return;
        
        gameOver = true;
        currentWinner = winner;
        
        const nextBtn = document.getElementById('nextCycleBtn');
        nextBtn.disabled = true;
        nextBtn.style.opacity = '0.5';
        
        const nudgeUpBtn = document.getElementById('nudgeUpBtn');
        const nudgeDownBtn = document.getElementById('nudgeDownBtn');
        const nudgeAgentSelect = document.getElementById('nudgeAgentSelect');
        const nudgeTraitSelect = document.getElementById('nudgeTraitSelect');
        nudgeUpBtn.disabled = true;
        nudgeDownBtn.disabled = true;
        nudgeAgentSelect.disabled = true;
        nudgeTraitSelect.disabled = true;
        
        alert(`GAME OVER! ${winner.toUpperCase()} WINS!\n\nClick OK to start a fresh game.`);
        
        startNewGame();
    }
    
    function toggleGraph() {
        graphVisible = !graphVisible;
        const container = document.getElementById('graphContainer');
        const toggleBtn = document.getElementById('toggleGraphBtn');
        
        if (graphVisible) {
            container.style.display = 'block';
            toggleBtn.innerHTML = '📊 HIDE GRAPH';
            toggleBtn.style.background = '#0a0';
            // Try to render if we have data
            if (currentGraphData && currentGraphData.nodes && currentGraphData.nodes.length > 0) {
                renderCanvasGraph(currentGraphData);
            } else if (agents.length > 0) {
                // Build basic graph from relationships if no trustMatrix
                buildBasicGraphFromRelations();
            }
        } else {
            container.style.display = 'none';
            toggleBtn.innerHTML = '📊 SHOW GRAPH';
            toggleBtn.style.background = '#333';
        }
    }
    
    function buildBasicGraphFromRelations() {
        // Fallback if server doesn't send trustMatrix
        const nodes = agents.map(a => ({
            id: a.id,
            name: a.name,
            role: a.role,
            roleName: a.roleName,
            alive: a.alive,
            aggression: a.aggression,
            loyalty: a.loyalty,
            paranoia: a.paranoia,
            deceit: a.deceit
        }));
        
        // Generate mock edges for visualization (random trust based on traits)
        const edges = [];
        for (let i = 0; i < nodes.length; i++) {
            for (let j = i + 1; j < nodes.length; j++) {
                if (nodes[i].alive && nodes[j].alive) {
                    // Calculate trust based on trait similarity
                    const trust = (nodes[i].aggression - nodes[j].aggression) * 0.3 + 
                                  (nodes[i].loyalty - nodes[j].loyalty) * 0.3 +
                                  (Math.random() - 0.5) * 0.4;
                    if (Math.abs(trust) > 0.1) {
                        edges.push({
                            source: nodes[i].id,
                            target: nodes[j].id,
                            trust: Math.max(-1, Math.min(1, trust)),
                            liking: trust * 0.8
                        });
                    }
                }
            }
        }
        
        currentGraphData = { nodes, edges: edges.slice(0, 50) };
        renderCanvasGraph(currentGraphData);
    }
    
    function connect() {
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.close();
        }
        
        const wsUrl = `wss://edgemafia-neural.onrender.com`;
        
        ws = new WebSocket(wsUrl);
        
        ws.onopen = () => {
            document.getElementById('status').innerHTML = '<span class="connected">●</span> Connected';
            
            currentAgentCount = promptAgentCount();
            document.getElementById('agentCountBadge').textContent = `Agents: ${currentAgentCount}`;
            
            const uniqueGameId = generateGameId();
            expectedNextGameId = uniqueGameId;
            currentGameId = uniqueGameId;
            document.getElementById('gameIdBadge').textContent = `Game: ${uniqueGameId.substring(0, 20)}...`;
            
            gameOver = false;
            currentWinner = null;
            isResetting = false;
            
            ws.send(JSON.stringify({ 
                type: 'join_game', 
                gameId: uniqueGameId, 
                createNew: true, 
                n: currentAgentCount
            }));
        };
        
        ws.onmessage = (event) => {
            const msg = JSON.parse(event.data);
            
            if (msg.data && msg.data.gameId && expectedNextGameId && msg.data.gameId !== expectedNextGameId) {
                return;
            }
            
            if (msg.type === 'state') {
                if (msg.data.gameId === currentGameId || !expectedNextGameId) {
                    updateUI(msg.data);
                    // Store graph data and render if visible
                    if (msg.data.trustMatrix) {
                        currentGraphData = msg.data.trustMatrix;
                        if (graphVisible) {
                            renderCanvasGraph(currentGraphData);
                        }
                    } else if (graphVisible && agents.length > 0) {
                        buildBasicGraphFromRelations();
                    }
                    if (msg.data.gameOver && !gameOver && !isResetting) {
                        handleGameOver(msg.data.winner || 'unknown');
                    }
                }
            }
            if (msg.type === 'cycle_complete') {
                if (msg.data.gameId === currentGameId && !isResetting) {
                    updateUI(msg.data);
                    if (msg.data.trustMatrix) {
                        currentGraphData = msg.data.trustMatrix;
                        if (graphVisible) {
                            renderCanvasGraph(currentGraphData);
                        }
                    } else if (graphVisible && agents.length > 0) {
                        buildBasicGraphFromRelations();
                    }
                    if (msg.winner && !gameOver) {
                        handleGameOver(msg.winner);
                    }
                }
            }
            if (msg.type === 'nudge_ack') {
                showToast(`Nudged Agent ${msg.agentId}: ${msg.trait} → ${msg.newValue.toFixed(3)}`);
            }
        };
        
        ws.onclose = () => {
            document.getElementById('status').innerHTML = '<span class="disconnected">●</span> Disconnected - reconnecting...';
            setTimeout(connect, 3000);
        };
        
        ws.onerror = (err) => {
            console.error('WebSocket error:', err);
        };
    }
    
    function updateUI(state) {
        if (expectedNextGameId && state.gameId !== expectedNextGameId && state.gameId !== currentGameId) {
            return;
        }
        
        currentGameId = state.gameId;
        agents = state.agents;
        
        document.getElementById('cycle').textContent = state.cycle;
        document.getElementById('mafiaCount').textContent = state.mafiaAlive;
        document.getElementById('townCount').textContent = state.townAlive;
        document.getElementById('totalCount').textContent = state.agents.length;
        
        const tbody = document.getElementById('agentTable');
        tbody.innerHTML = '';
        
        const nudgeSelect = document.getElementById('nudgeAgentSelect');
        nudgeSelect.innerHTML = '';
        
        for (const agent of state.agents) {
            const row = tbody.insertRow();
            row.className = agent.alive ? '' : 'dead';
            
            row.insertCell(0).textContent = agent.id;
            row.insertCell(1).textContent = agent.name;
            row.insertCell(2).innerHTML = `<span class="${agent.role === 0 ? 'mafia' : 'town'}">${agent.roleName}</span>`;
            
            row.insertCell(3).innerHTML = renderTraitBar(agent.aggression);
            row.insertCell(4).innerHTML = renderTraitBar(agent.loyalty);
            row.insertCell(5).innerHTML = renderTraitBar(agent.paranoia);
            row.insertCell(6).innerHTML = renderTraitBar(agent.deceit);
            row.insertCell(7).innerHTML = agent.totalReward.toFixed(2);
            
            const nudgeCell = row.insertCell(8);
            const nudgeBtn = document.createElement('button');
            nudgeBtn.textContent = 'Nudge';
            nudgeBtn.style.fontSize = '11px';
            nudgeBtn.style.padding = '2px 5px';
            nudgeBtn.onclick = () => {
                document.getElementById('nudgeAgentSelect').value = agent.id;
            };
            nudgeCell.appendChild(nudgeBtn);
            
            const option = document.createElement('option');
            option.value = agent.id;
            option.textContent = `${agent.id}: ${agent.name} (${agent.roleName})`;
            nudgeSelect.appendChild(option);
        }
    }
    
    function renderTraitBar(value) {
        const percent = ((value + 1) / 2) * 100;
        const colorClass = value >= 0 ? 'positive' : 'negative';
        return `
            <div class="trait-bar">
                <div class="trait-fill ${colorClass}" style="width: ${percent}%"></div>
            </div>
            <span class="trait-value">${value.toFixed(2)}</span>
        `;
    }
    
    function nextCycle() {
        if (gameOver) {
            showToast('Game over! Starting new game...');
            startNewGame();
            return;
        }
        
        if (isResetting) {
            showToast('Please wait, resetting game...');
            return;
        }
        
        if (ws && ws.readyState === WebSocket.OPEN && currentGameId) {
            ws.send(JSON.stringify({ type: 'next_cycle' }));
        } else {
            showToast('WebSocket disconnected. Reconnecting...');
            connect();
        }
    }
    
    function nudgeAgent(agentId, trait, delta) {
        if (gameOver) {
            showToast('Game is over! Start a new game to nudge agents.');
            return;
        }
        
        if (isResetting) {
            showToast('Please wait, game is resetting...');
            return;
        }
        
        if (ws && ws.readyState === WebSocket.OPEN && currentGameId) {
            ws.send(JSON.stringify({ type: 'nudge', agentId, trait, delta }));
        }
    }
    
    // Event listeners
    document.getElementById('nextCycleBtn').onclick = nextCycle;
    document.getElementById('newGameBtn').onclick = () => startNewGame();
    document.getElementById('toggleGraphBtn').onclick = toggleGraph;
    document.getElementById('nudgeUpBtn').onclick = () => {
        const agentId = parseInt(document.getElementById('nudgeAgentSelect').value);
        const trait = document.getElementById('nudgeTraitSelect').value;
        if (!isNaN(agentId)) nudgeAgent(agentId, trait, 0.1);
    };
    document.getElementById('nudgeDownBtn').onclick = () => {
        const agentId = parseInt(document.getElementById('nudgeAgentSelect').value);
        const trait = document.getElementById('nudgeTraitSelect').value;
        if (!isNaN(agentId)) nudgeAgent(agentId, trait, -0.1);
    };
    
    connect();
</script>
</body>
</html>
