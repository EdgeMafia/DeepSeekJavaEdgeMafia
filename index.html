<!DOCTYPE html>
<html>
<head>
    <title>EdgeMafia - Pure AI Mafia Game</title>
    <style>
        * { box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #0f0;
            font-family: 'Courier New', monospace;
            margin: 0;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        
        .hud {
            background: #000;
            border: 2px solid #0f0;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
        }
        
        .title-section {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 1px solid #0f0;
            padding-bottom: 10px;
        }
        
        .main-title {
            font-size: 48px;
            font-weight: bold;
            letter-spacing: 4px;
            color: #0f0;
            text-shadow: 0 0 10px #0f0;
        }
        
        .subtitle {
            font-size: 14px;
            color: #888;
            letter-spacing: 2px;
        }
        
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #333;
        }
        .stat {
            background: #111;
            padding: 8px 15px;
            border-radius: 5px;
        }
        .stat-label { color: #888; font-size: 12px; }
        .stat-value { font-size: 24px; font-weight: bold; }
        .mafia { color: #f00; }
        .town { color: #0f0; }
        
        .agent-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        .agent-table th, .agent-table td {
            padding: 8px;
            text-align: left;
            border-bottom: 1px solid #333;
        }
        .agent-table th { background: #111; color: #0f0; }
        .agent-table tr:hover { background: #111; }
        .dead { opacity: 0.4; }
        
        .trait-bar {
            width: 80px;
            height: 16px;
            background: #222;
            border-radius: 3px;
            overflow: hidden;
            display: inline-block;
        }
        .trait-fill {
            height: 100%;
            transition: width 0.2s;
        }
        .trait-fill.positive { background: #0f0; }
        .trait-fill.negative { background: #f00; }
        .trait-value { font-size: 11px; margin-left: 5px; }
        
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        button {
            background: #0f0;
            color: #000;
            border: none;
            padding: 10px 20px;
            font-family: monospace;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.2s ease;
        }
        button:hover { background: #0a0; transform: scale(1.02); }
        button:disabled {
            background: #333;
            color: #666;
            cursor: not-allowed;
            transform: none;
        }
        .nudge-group {
            background: #111;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
        }
        select, input {
            background: #222;
            color: #0f0;
            border: 1px solid #0f0;
            padding: 5px;
            font-family: monospace;
        }
        
        /* Social Network Graph Styles */
        .graph-container {
            background: #000;
            border: 2px solid #0f0;
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
        }
        
        .graph-title {
            color: #0f0;
            font-size: 14px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .graph-legend {
            display: flex;
            gap: 20px;
            font-size: 10px;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 2px;
        }
        
        .legend-color.mafia { background: #f00; }
        .legend-color.town { background: #0f0; }
        .legend-color.trust-high { background: #0f0; }
        .legend-color.trust-low { background: #f00; }
        .legend-color.trust-mid { background: #ff0; }
        
        svg {
            background: #0a0a0a;
            border-radius: 5px;
            cursor: move;
        }
        
        .node circle {
            stroke: #fff;
            stroke-width: 2px;
            transition: r 0.2s;
            cursor: pointer;
        }
        
        .node circle:hover {
            stroke-width: 3px;
            filter: brightness(1.2);
        }
        
        .node text {
            fill: #0f0;
            font-size: 10px;
            font-family: 'Courier New', monospace;
            pointer-events: none;
            text-shadow: 0 0 2px #000;
        }
        
        .link {
            stroke-opacity: 0.6;
            transition: stroke-width 0.2s;
        }
        
        .link:hover {
            stroke-opacity: 1;
            stroke-width: 3px;
        }
        
        .node-label {
            font-size: 9px;
            fill: #0f0;
        }
        
        .tooltip {
            position: absolute;
            background: #000;
            border: 1px solid #0f0;
            padding: 5px 10px;
            font-size: 11px;
            font-family: monospace;
            color: #0f0;
            border-radius: 5px;
            pointer-events: none;
            z-index: 1000;
            white-space: nowrap;
        }
        
        .status {
            position: fixed;
            top: 10px;
            right: 10px;
            background: #000;
            border: 1px solid #0f0;
            padding: 5px 10px;
            font-size: 12px;
            border-radius: 5px;
        }
        .connected { color: #0f0; }
        .disconnected { color: #f00; }
        
        .game-id-badge {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: #000;
            border: 1px solid #333;
            padding: 4px 8px;
            font-size: 10px;
            color: #666;
            border-radius: 5px;
            font-family: monospace;
        }
        
        .agent-count-badge {
            position: fixed;
            bottom: 10px;
            left: 10px;
            background: #000;
            border: 1px solid #333;
            padding: 4px 8px;
            font-size: 10px;
            color: #666;
            border-radius: 5px;
            font-family: monospace;
        }
        
        .toast {
            position: fixed;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            background: #0a0;
            color: #000;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            font-family: monospace;
            z-index: 1000;
            animation: fadeOut 2s ease forwards;
            pointer-events: none;
        }
        
        @keyframes fadeOut {
            0% { opacity: 1; bottom: 50px; }
            70% { opacity: 1; bottom: 60px; }
            100% { opacity: 0; bottom: 70px; visibility: hidden; }
        }
    </style>
    <!-- D3.js for graph visualization -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
<div class="container">
    <div class="hud">
        <div class="title-section">
            <div class="main-title">EDGEMAFIA</div>
            <div class="subtitle">by Aston Walker</div>
        </div>
        
        <div class="stats">
            <div class="stat">
                <div class="stat-label">CYCLE</div>
                <div class="stat-value" id="cycle">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">MAFIA</div>
                <div class="stat-value mafia" id="mafiaCount">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">TOWN</div>
                <div class="stat-value town" id="townCount">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">TOTAL</div>
                <div class="stat-value" id="totalCount">0</div>
            </div>
        </div>
        
        <div style="overflow-x: auto;">
            <table class="agent-table">
                <thead>
                    <tr><th>ID</th><th>NAME</th><th>ROLE</th><th>AGG</th><th>LOY</th><th>PAR</th><th>DEC</th><th>REWARD</th><th>NUDGE</th></tr>
                </thead>
                <tbody id="agentTable"></tbody>
            </table>
        </div>
        
        <!-- SOCIAL NETWORK GRAPH SECTION -->
        <div class="graph-container" id="graphContainer" style="display: none;">
            <div class="graph-title">
                <span>🔗 SOCIAL NETWORK GRAPH (Trust Relationships)</span>
                <div class="graph-legend">
                    <div class="legend-item"><div class="legend-color mafia"></div><span>Mafia</span></div>
                    <div class="legend-item"><div class="legend-color town"></div><span>Town</span></div>
                    <div class="legend-item"><div class="legend-color trust-high"></div><span>Trust &gt; 0.5</span></div>
                    <div class="legend-item"><div class="legend-color trust-mid"></div><span>Trust 0 to 0.5</span></div>
                    <div class="legend-item"><div class="legend-color trust-low"></div><span>Trust &lt; 0</span></div>
                </div>
            </div>
            <div id="graph"></div>
        </div>
        
        <div class="controls">
            <button id="nextCycleBtn">▶ NEXT CYCLE</button>
            <button id="newGameBtn">🔄 NEW GAME</button>
            <button id="toggleGraphBtn" style="background:#333;">📊 SHOW GRAPH</button>
        </div>
        
        <div class="nudge-group">
            <strong>NUDGE SELECTED AGENT:</strong>
            <select id="nudgeAgentSelect"></select>
            <select id="nudgeTraitSelect">
                <option value="aggression">Aggression</option>
                <option value="loyalty">Loyalty</option>
                <option value="paranoia">Paranoia</option>
                <option value="deceit">Deceit</option>
            </select>
            <button id="nudgeUpBtn">+0.1</button>
            <button id="nudgeDownBtn">-0.1</button>
        </div>
    </div>
</div>

<div class="status" id="status">
    <span class="disconnected">●</span> Disconnected
</div>
<div class="game-id-badge" id="gameIdBadge">Game: ---</div>
<div class="agent-count-badge" id="agentCountBadge">Agents: ---</div>

<script>
    let ws = null;
    let currentGameId = null;
    let currentAgentCount = 20;
    let agents = [];
    let gameOver = false;
    let currentWinner = null;
    let isResetting = false;
    let expectedNextGameId = null;
    
    // Graph state
    let graphVisible = false;
    let svg = null;
    let simulation = null;
    let currentGraphData = { nodes: [], edges: [] };
    
    function generateGameId() {
        const timestamp = Date.now();
        const random = Math.random().toString(36).substring(2, 8);
        return `game_${timestamp}_${random}`;
    }
    
    function showToast(message) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }
    
    function promptAgentCount() {
        let input = prompt('Number of AI agents per game (6-100):', '20');
        let count = parseInt(input);
        
        if (isNaN(count)) {
            count = 20;
        } else if (count < 6) {
            alert('Minimum 6 agents. Using 6.');
            count = 6;
        } else if (count > 100) {
            alert('Maximum 100 agents. Using 100.');
            count = 100;
        }
        
        return count;
    }
    
    // Initialize or update the social network graph
    function updateGraph(trustMatrix) {
        if (!graphVisible || !trustMatrix) return;
        
        const container = document.getElementById('graph');
        const width = container.clientWidth || 1000;
        const height = 500;
        
        // Filter dead nodes and ensure unique nodes
        const aliveNodes = trustMatrix.nodes.filter(n => n.alive);
        const nodeMap = new Map();
        aliveNodes.forEach(n => nodeMap.set(n.id, n));
        
        // Filter edges where both ends are alive
        const validEdges = trustMatrix.edges.filter(e => 
            nodeMap.has(e.source) && nodeMap.has(e.target)
        );
        
        currentGraphData = {
            nodes: aliveNodes,
            edges: validEdges
        };
        
        if (currentGraphData.nodes.length === 0) return;
        
        // Clear previous graph
        d3.select("#graph svg").remove();
        
        // Create new SVG
        svg = d3.select("#graph")
            .append("svg")
            .attr("width", width)
            .attr("height", height)
            .attr("viewBox", [0, 0, width, height])
            .style("background", "#0a0a0a");
        
        // Add zoom behavior
        const zoom = d3.zoom()
            .scaleExtent([0.5, 2])
            .on("zoom", (event) => {
                svg.selectAll(".zoom-group").attr("transform", event.transform);
            });
        
        svg.call(zoom);
        
        const mainGroup = svg.append("g").attr("class", "zoom-group");
        
        // Create force simulation
        simulation = d3.forceSimulation(currentGraphData.nodes)
            .force("link", d3.forceLink(currentGraphData.edges).id(d => d.id).distance(120).strength(0.5))
            .force("charge", d3.forceManyBody().strength(-200))
            .force("center", d3.forceCenter(width / 2, height / 2))
            .force("collision", d3.forceCollide().radius(30));
        
        // Draw edges (links)
        const link = mainGroup.append("g")
            .attr("class", "links")
            .selectAll("line")
            .data(currentGraphData.edges)
            .enter()
            .append("line")
            .attr("class", "link")
            .attr("stroke", d => {
                if (d.trust > 0.5) return "#0f0";
                if (d.trust > 0) return "#ff0";
                return "#f00";
            })
            .attr("stroke-width", d => Math.min(3, Math.abs(d.trust) * 3 + 1))
            .attr("stroke-dasharray", d => d.trust < 0 ? "4,4" : "none");
        
        // Add tooltip on edges
        link.append("title")
            .text(d => `Trust: ${d.trust.toFixed(3)}\nLiking: ${d.liking.toFixed(3)}`);
        
        // Draw nodes
        const node = mainGroup.append("g")
            .attr("class", "nodes")
            .selectAll("g")
            .data(currentGraphData.nodes)
            .enter()
            .append("g")
            .attr("class", "node")
            .call(d3.drag()
                .on("start", dragStarted)
                .on("drag", dragged)
                .on("end", dragEnded));
        
        // Node circles
        node.append("circle")
            .attr("r", d => d.role === 0 ? 14 : 10)
            .attr("fill", d => d.role === 0 ? "#800" : "#080")
            .attr("stroke", d => d.role === 0 ? "#f00" : "#0f0")
            .attr("stroke-width", 2);
        
        // Node labels
        node.append("text")
            .attr("text-anchor", "middle")
            .attr("dy", -15)
            .text(d => `${d.id}: ${d.name.substring(0, 8)}`)
            .attr("fill", "#0f0")
            .attr("font-size", "10px")
            .attr("font-family", "monospace");
        
        // Small trait indicators below node
        node.append("text")
            .attr("text-anchor", "middle")
            .attr("dy", 22)
            .html(d => `A:${d.aggression.toFixed(1)}`)
            .attr("fill", "#888")
            .attr("font-size", "8px");
        
        // Tooltip on nodes
        node.append("title")
            .text(d => `${d.name} (${d.roleName})
Aggression: ${d.aggression.toFixed(3)}
Loyalty: ${d.loyalty.toFixed(3)}
Paranoia: ${d.paranoia.toFixed(3)}
Deceit: ${d.deceit.toFixed(3)}`);
        
        // Update positions on simulation tick
        simulation.on("tick", () => {
            link
                .attr("x1", d => d.source.x)
                .attr("y1", d => d.source.y)
                .attr("x2", d => d.target.x)
                .attr("y2", d => d.target.y);
            
            node
                .attr("transform", d => `translate(${d.x},${d.y})`);
        });
        
        // Drag functions
        function dragStarted(event, d) {
            if (!event.active) simulation.alphaTarget(0.3).restart();
            d.fx = d.x;
            d.fy = d.y;
        }
        
        function dragged(event, d) {
            d.fx = event.x;
            d.fy = event.y;
        }
        
        function dragEnded(event, d) {
            if (!event.active) simulation.alphaTarget(0);
            d.fx = null;
            d.fy = null;
        }
        
        // Add resize handler
        window.addEventListener('resize', () => {
            if (graphVisible) {
                updateGraph(trustMatrix);
            }
        });
    }
    
    function dragStarted(event, d) {
        if (!event.active) simulation.alphaTarget(0.3).restart();
        d.fx = d.x;
        d.fy = d.y;
    }
    
    function dragged(event, d) {
        d.fx = event.x;
        d.fy = event.y;
    }
    
    function dragEnded(event, d) {
        if (!event.active) simulation.alphaTarget(0);
        d.fx = null;
        d.fy = null;
    }
    
    async function startNewGame() {
        if (isResetting) return;
        
        isResetting = true;
        
        const newAgentCount = promptAgentCount();
        if (newAgentCount === null) {
            isResetting = false;
            return;
        }
        
        currentAgentCount = newAgentCount;
        document.getElementById('agentCountBadge').textContent = `Agents: ${currentAgentCount}`;
        
        const uniqueGameId = generateGameId();
        expectedNextGameId = uniqueGameId;
        currentGameId = uniqueGameId;
        document.getElementById('gameIdBadge').textContent = `Game: ${uniqueGameId.substring(0, 20)}...`;
        
        gameOver = false;
        currentWinner = null;
        
        const nextBtn = document.getElementById('nextCycleBtn');
        nextBtn.disabled = false;
        nextBtn.style.opacity = '1';
        
        const nudgeUpBtn = document.getElementById('nudgeUpBtn');
        const nudgeDownBtn = document.getElementById('nudgeDownBtn');
        const nudgeAgentSelect = document.getElementById('nudgeAgentSelect');
        const nudgeTraitSelect = document.getElementById('nudgeTraitSelect');
        nudgeUpBtn.disabled = false;
        nudgeDownBtn.disabled = false;
        nudgeAgentSelect.disabled = false;
        nudgeTraitSelect.disabled = false;
        
        showToast('Starting fresh game...');
        
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ 
                type: 'join_game', 
                gameId: uniqueGameId, 
                createNew: true, 
                n: currentAgentCount
            }));
        } else {
            connect();
        }
        
        setTimeout(() => {
            isResetting = false;
        }, 1000);
    }
    
    function handleGameOver(winner) {
        if (gameOver) return;
        if (isResetting) return;
        
        gameOver = true;
        currentWinner = winner;
        
        const nextBtn = document.getElementById('nextCycleBtn');
        nextBtn.disabled = true;
        nextBtn.style.opacity = '0.5';
        
        const nudgeUpBtn = document.getElementById('nudgeUpBtn');
        const nudgeDownBtn = document.getElementById('nudgeDownBtn');
        const nudgeAgentSelect = document.getElementById('nudgeAgentSelect');
        const nudgeTraitSelect = document.getElementById('nudgeTraitSelect');
        nudgeUpBtn.disabled = true;
        nudgeDownBtn.disabled = true;
        nudgeAgentSelect.disabled = true;
        nudgeTraitSelect.disabled = true;
        
        alert(`GAME OVER! ${winner.toUpperCase()} WINS!\n\nClick OK to start a fresh game.`);
        
        startNewGame();
    }
    
    function toggleGraph() {
        graphVisible = !graphVisible;
        const container = document.getElementById('graphContainer');
        const toggleBtn = document.getElementById('toggleGraphBtn');
        
        if (graphVisible) {
            container.style.display = 'block';
            toggleBtn.innerHTML = '📊 HIDE GRAPH';
            toggleBtn.style.background = '#0a0';
            // Trigger graph render on next state update
            if (currentGraphData.nodes.length > 0) {
                updateGraph(currentGraphData);
            }
        } else {
            container.style.display = 'none';
            toggleBtn.innerHTML = '📊 SHOW GRAPH';
            toggleBtn.style.background = '#333';
        }
    }
    
    function connect() {
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.close();
        }
        
        const wsUrl = `wss://edgemafia-neural.onrender.com`;
        
        ws = new WebSocket(wsUrl);
        
        ws.onopen = () => {
            document.getElementById('status').innerHTML = '<span class="connected">●</span> Connected';
            
            currentAgentCount = promptAgentCount();
            document.getElementById('agentCountBadge').textContent = `Agents: ${currentAgentCount}`;
            
            const uniqueGameId = generateGameId();
            expectedNextGameId = uniqueGameId;
            currentGameId = uniqueGameId;
            document.getElementById('gameIdBadge').textContent = `Game: ${uniqueGameId.substring(0, 20)}...`;
            
            gameOver = false;
            currentWinner = null;
            isResetting = false;
            
            ws.send(JSON.stringify({ 
                type: 'join_game', 
                gameId: uniqueGameId, 
                createNew: true, 
                n: currentAgentCount
            }));
        };
        
        ws.onmessage = (event) => {
            const msg = JSON.parse(event.data);
            
            if (msg.data && msg.data.gameId && expectedNextGameId && msg.data.gameId !== expectedNextGameId) {
                return;
            }
            
            if (msg.type === 'state') {
                if (msg.data.gameId === currentGameId || !expectedNextGameId) {
                    updateUI(msg.data);
                    // Update graph with trust matrix
                    if (msg.data.trustMatrix && graphVisible) {
                        updateGraph(msg.data.trustMatrix);
                        currentGraphData = msg.data.trustMatrix;
                    }
                    if (msg.data.gameOver && !gameOver && !isResetting) {
                        handleGameOver(msg.data.winner || 'unknown');
                    }
                }
            }
            if (msg.type === 'cycle_complete') {
                if (msg.data.gameId === currentGameId && !isResetting) {
                    updateUI(msg.data);
                    if (msg.data.trustMatrix && graphVisible) {
                        updateGraph(msg.data.trustMatrix);
                        currentGraphData = msg.data.trustMatrix;
                    }
                    if (msg.winner && !gameOver) {
                        handleGameOver(msg.winner);
                    }
                }
            }
            if (msg.type === 'nudge_ack') {
                showToast(`Nudged Agent ${msg.agentId}: ${msg.trait} → ${msg.newValue.toFixed(3)}`);
            }
        };
        
        ws.onclose = () => {
            document.getElementById('status').innerHTML = '<span class="disconnected">●</span> Disconnected - reconnecting...';
            setTimeout(connect, 3000);
        };
        
        ws.onerror = (err) => {
            console.error('WebSocket error:', err);
        };
    }
    
    function updateUI(state) {
        if (expectedNextGameId && state.gameId !== expectedNextGameId && state.gameId !== currentGameId) {
            return;
        }
        
        currentGameId = state.gameId;
        agents = state.agents;
        
        document.getElementById('cycle').textContent = state.cycle;
        document.getElementById('mafiaCount').textContent = state.mafiaAlive;
        document.getElementById('townCount').textContent = state.townAlive;
        document.getElementById('totalCount').textContent = state.agents.length;
        
        const tbody = document.getElementById('agentTable');
        tbody.innerHTML = '';
        
        const nudgeSelect = document.getElementById('nudgeAgentSelect');
        nudgeSelect.innerHTML = '';
        
        for (const agent of state.agents) {
            const row = tbody.insertRow();
            row.className = agent.alive ? '' : 'dead';
            
            row.insertCell(0).textContent = agent.id;
            row.insertCell(1).textContent = agent.name;
            row.insertCell(2).innerHTML = `<span class="${agent.role === 0 ? 'mafia' : 'town'}">${agent.roleName}</span>`;
            
            row.insertCell(3).innerHTML = renderTraitBar(agent.aggression);
            row.insertCell(4).innerHTML = renderTraitBar(agent.loyalty);
            row.insertCell(5).innerHTML = renderTraitBar(agent.paranoia);
            row.insertCell(6).innerHTML = renderTraitBar(agent.deceit);
            row.insertCell(7).innerHTML = agent.totalReward.toFixed(2);
            
            const nudgeCell = row.insertCell(8);
            const nudgeBtn = document.createElement('button');
            nudgeBtn.textContent = 'Nudge';
            nudgeBtn.style.fontSize = '11px';
            nudgeBtn.style.padding = '2px 5px';
            nudgeBtn.onclick = () => {
                document.getElementById('nudgeAgentSelect').value = agent.id;
            };
            nudgeCell.appendChild(nudgeBtn);
            
            const option = document.createElement('option');
            option.value = agent.id;
            option.textContent = `${agent.id}: ${agent.name} (${agent.roleName})`;
            nudgeSelect.appendChild(option);
        }
    }
    
    function renderTraitBar(value) {
        const percent = ((value + 1) / 2) * 100;
        const colorClass = value >= 0 ? 'positive' : 'negative';
        return `
            <div class="trait-bar">
                <div class="trait-fill ${colorClass}" style="width: ${percent}%"></div>
            </div>
            <span class="trait-value">${value.toFixed(2)}</span>
        `;
    }
    
    function nextCycle() {
        if (gameOver) {
            showToast('Game over! Starting new game...');
            startNewGame();
            return;
        }
        
        if (isResetting) {
            showToast('Please wait, resetting game...');
            return;
        }
        
        if (ws && ws.readyState === WebSocket.OPEN && currentGameId) {
            ws.send(JSON.stringify({ type: 'next_cycle' }));
        } else {
            showToast('WebSocket disconnected. Reconnecting...');
            connect();
        }
    }
    
    function nudgeAgent(agentId, trait, delta) {
        if (gameOver) {
            showToast('Game is over! Start a new game to nudge agents.');
            return;
        }
        
        if (isResetting) {
            showToast('Please wait, game is resetting...');
            return;
        }
        
        if (ws && ws.readyState === WebSocket.OPEN && currentGameId) {
            ws.send(JSON.stringify({ type: 'nudge', agentId, trait, delta }));
        }
    }
    
    // Event listeners
    document.getElementById('nextCycleBtn').onclick = nextCycle;
    document.getElementById('newGameBtn').onclick = () => startNewGame();
    document.getElementById('toggleGraphBtn').onclick = toggleGraph;
    document.getElementById('nudgeUpBtn').onclick = () => {
        const agentId = parseInt(document.getElementById('nudgeAgentSelect').value);
        const trait = document.getElementById('nudgeTraitSelect').value;
        if (!isNaN(agentId)) nudgeAgent(agentId, trait, 0.1);
    };
    document.getElementById('nudgeDownBtn').onclick = () => {
        const agentId = parseInt(document.getElementById('nudgeAgentSelect').value);
        const trait = document.getElementById('nudgeTraitSelect').value;
        if (!isNaN(agentId)) nudgeAgent(agentId, trait, -0.1);
    };
    
    connect();
</script>
</body>
</html>
