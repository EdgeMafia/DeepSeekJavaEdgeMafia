<!DOCTYPE html>
<html>
<head>
    <title>EdgeMafia - Pure AI Mafia Game</title>
    <style>
        * { box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #0f0;
            font-family: 'Courier New', monospace;
            margin: 0;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        
        .hud {
            background: #000;
            border: 2px solid #0f0;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
        }
        
        .title-section {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 1px solid #0f0;
            padding-bottom: 10px;
        }
        
        .main-title {
            font-size: 48px;
            font-weight: bold;
            letter-spacing: 4px;
            color: #0f0;
            text-shadow: 0 0 10px #0f0;
        }
        
        .subtitle {
            font-size: 14px;
            color: #888;
            letter-spacing: 2px;
        }
        
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #333;
        }
        .stat {
            background: #111;
            padding: 8px 15px;
            border-radius: 5px;
        }
        .stat-label { color: #888; font-size: 12px; }
        .stat-value { font-size: 24px; font-weight: bold; }
        .mafia { color: #f00; }
        .town { color: #0f0; }
        
        .agent-table {
            width: 100%;
            border-collapse: collapse;
        }
        .agent-table th, .agent-table td {
            padding: 8px;
            text-align: left;
            border-bottom: 1px solid #333;
        }
        .agent-table th { background: #111; color: #0f0; }
        .agent-table tr:hover { background: #111; }
        .dead { opacity: 0.4; }
        
        .trait-bar {
            width: 80px;
            height: 16px;
            background: #222;
            border-radius: 3px;
            overflow: hidden;
            display: inline-block;
        }
        .trait-fill {
            height: 100%;
            transition: width 0.2s;
        }
        .trait-fill.positive { background: #0f0; }
        .trait-fill.negative { background: #f00; }
        .trait-value { font-size: 11px; margin-left: 5px; }
        
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        button {
            background: #0f0;
            color: #000;
            border: none;
            padding: 10px 20px;
            font-family: monospace;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.2s ease;
        }
        button:hover { background: #0a0; transform: scale(1.02); }
        button:disabled {
            background: #333;
            color: #666;
            cursor: not-allowed;
            transform: none;
        }
        .nudge-group {
            background: #111;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
        }
        select, input {
            background: #222;
            color: #0f0;
            border: 1px solid #0f0;
            padding: 5px;
            font-family: monospace;
        }
        
        .status {
            position: fixed;
            top: 10px;
            right: 10px;
            background: #000;
            border: 1px solid #0f0;
            padding: 5px 10px;
            font-size: 12px;
            border-radius: 5px;
        }
        .connected { color: #0f0; }
        .disconnected { color: #f00; }
        
        .game-id-badge {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: #000;
            border: 1px solid #333;
            padding: 4px 8px;
            font-size: 10px;
            color: #666;
            border-radius: 5px;
            font-family: monospace;
        }
        
        .agent-count-badge {
            position: fixed;
            bottom: 10px;
            left: 10px;
            background: #000;
            border: 1px solid #333;
            padding: 4px 8px;
            font-size: 10px;
            color: #666;
            border-radius: 5px;
            font-family: monospace;
        }
        
        .controller-overlay {
            position: fixed;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            border: 1px solid #0f0;
            border-radius: 8px;
            padding: 8px 16px;
            font-size: 10px;
            color: #0f0;
            font-family: monospace;
            z-index: 999;
            pointer-events: none;
            white-space: nowrap;
        }
        
        .toast {
            position: fixed;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            background: #0a0;
            color: #000;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            font-family: monospace;
            z-index: 1000;
            animation: fadeOut 2s ease forwards;
            pointer-events: none;
        }
        
        @keyframes fadeOut {
            0% { opacity: 1; bottom: 50px; }
            70% { opacity: 1; bottom: 60px; }
            100% { opacity: 0; bottom: 70px; visibility: hidden; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="hud">
        <div class="title-section">
            <div class="main-title">EDGEMAFIA</div>
            <div class="subtitle">by Aston Walker</div>
        </div>
        
        <div class="stats">
            <div class="stat">
                <div class="stat-label">CYCLE</div>
                <div class="stat-value" id="cycle">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">MAFIA</div>
                <div class="stat-value mafia" id="mafiaCount">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">TOWN</div>
                <div class="stat-value town" id="townCount">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">TOTAL</div>
                <div class="stat-value" id="totalCount">0</div>
            </div>
        </div>
        
        <table class="agent-table">
            <thead>
                <tr><th>ID</th><th>NAME</th><th>ROLE</th><th>AGG</th><th>LOY</th><th>PAR</th><th>DEC</th><th>REWARD</th><th>NUDGE</th></tr>
            </thead>
            <tbody id="agentTable"></tbody>
        </table>
        
        <div class="controls">
            <button id="nextCycleBtn">▶ NEXT CYCLE</button>
            <button id="newGameBtn">🔄 NEW GAME</button>
        </div>
        
        <div class="nudge-group">
            <strong>NUDGE SELECTED AGENT:</strong>
            <select id="nudgeAgentSelect"></select>
            <select id="nudgeTraitSelect">
                <option value="aggression">Aggression</option>
                <option value="loyalty">Loyalty</option>
                <option value="paranoia">Paranoia</option>
                <option value="deceit">Deceit</option>
            </select>
            <button id="nudgeUpBtn">+0.1</button>
            <button id="nudgeDownBtn">-0.1</button>
            <span style="margin-left: 10px; font-size: 12px;">(Or use Gamepad: A=next, X=nudge+, Y=nudge-, B=new game, Triggers=±10 agents)</span>
        </div>
    </div>
</div>

<div class="status" id="status">
    <span class="disconnected">●</span> Disconnected
</div>
<div class="game-id-badge" id="gameIdBadge">Game: ---</div>
<div class="agent-count-badge" id="agentCountBadge">Agents: ---</div>
<div class="controller-overlay" id="controllerOverlay">🎮 Controller: Connect Xbox controller</div>

<script>
    let ws = null;
    let currentGameId = null;
    let currentAgentCount = 20;
    let agents = [];
    let gameOver = false;
    let currentWinner = null;
    let isResetting = false;
    let expectedNextGameId = null;
    
    // Controller state tracking
    let gamepadInterval = null;
    let lastA = false;
    let lastX = false;
    let lastY = false;
    let lastB = false;
    let lastLeftTrigger = false;
    let lastRightTrigger = false;
    let isPromptActive = false;
    let pendingAgentCount = 20;
    
    // Generate unique session ID for this player
    function generateGameId() {
        const timestamp = Date.now();
        const random = Math.random().toString(36).substring(2, 8);
        return `game_${timestamp}_${random}`;
    }
    
    // Show a temporary toast message
    function showToast(message) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }
    
    // Update controller overlay
    function updateControllerOverlay(connected) {
        const overlay = document.getElementById('controllerOverlay');
        if (connected) {
            overlay.innerHTML = '🎮 Controller: Connected | A=Next Cycle | X=Nudge+ | Y=Nudge- | B=New Game | Triggers=±10 Agents';
            overlay.style.color = '#0f0';
            overlay.style.borderColor = '#0f0';
        } else {
            overlay.innerHTML = '🎮 Controller: Press any button to connect';
            overlay.style.color = '#666';
            overlay.style.borderColor = '#333';
        }
    }
    
    // Prompt for agent count with controller support
    function promptAgentCount() {
        return new Promise((resolve) => {
            let currentCount = 20;
            isPromptActive = true;
            pendingAgentCount = 20;
            
            // Create custom modal dialog for controller support
            const modal = document.createElement('div');
            modal.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0,0,0,0.9);
                z-index: 2000;
                display: flex;
                justify-content: center;
                align-items: center;
                font-family: 'Courier New', monospace;
            `;
            
            const dialog = document.createElement('div');
            dialog.style.cssText = `
                background: #000;
                border: 2px solid #0f0;
                border-radius: 10px;
                padding: 30px;
                text-align: center;
                min-width: 300px;
            `;
            
            dialog.innerHTML = `
                <h2 style="color:#0f0; margin-bottom:20px;">NUMBER OF AI AGENTS</h2>
                <div style="font-size:48px; color:#0f0; margin:20px;" id="agentCountDisplay">20</div>
                <div style="display:flex; gap:10px; justify-content:center; margin:20px;">
                    <button id="modalMinusBtn" style="background:#0f0; color:#000; padding:10px 20px; font-size:20px;">-10</button>
                    <button id="modalPlusBtn" style="background:#0f0; color:#000; padding:10px 20px; font-size:20px;">+10</button>
                </div>
                <div style="display:flex; gap:10px; justify-content:center; margin:20px;">
                    <button id="modalConfirmBtn" style="background:#0f0; color:#000; padding:10px 30px;">CONFIRM (A)</button>
                    <button id="modalCancelBtn" style="background:#333; color:#0f0; padding:10px 30px;">CANCEL (B)</button>
                </div>
                <div style="margin-top:20px; font-size:11px; color:#666;">
                    Controller: Left Trigger = -10 | Right Trigger = +10 | A = Confirm | B = Cancel
                </div>
            `;
            
            modal.appendChild(dialog);
            document.body.appendChild(modal);
            
            const display = document.getElementById('agentCountDisplay');
            
            const updateDisplay = () => {
                currentCount = Math.max(6, Math.min(100, currentCount));
                display.textContent = currentCount;
                pendingAgentCount = currentCount;
            };
            
            const plusHandler = () => {
                currentCount += 10;
                updateDisplay();
                showToast(`+10 agents → ${currentCount}`);
            };
            
            const minusHandler = () => {
                currentCount -= 10;
                updateDisplay();
                showToast(`-10 agents → ${currentCount}`);
            };
            
            const confirmHandler = () => {
                modal.remove();
                isPromptActive = false;
                resolve(currentCount);
            };
            
            const cancelHandler = () => {
                modal.remove();
                isPromptActive = false;
                resolve(null);
            };
            
            document.getElementById('modalPlusBtn').onclick = plusHandler;
            document.getElementById('modalMinusBtn').onclick = minusHandler;
            document.getElementById('modalConfirmBtn').onclick = confirmHandler;
            document.getElementById('modalCancelBtn').onclick = cancelHandler;
            
            // Keyboard support
            const keyHandler = (e) => {
                if (e.key === '+' || e.key === '=') { plusHandler(); e.preventDefault(); }
                else if (e.key === '-' || e.key === '_') { minusHandler(); e.preventDefault(); }
                else if (e.key === 'Enter') { confirmHandler(); e.preventDefault(); }
                else if (e.key === 'Escape') { cancelHandler(); e.preventDefault(); }
            };
            document.addEventListener('keydown', keyHandler);
            
            // Clean up
            const observer = new MutationObserver(() => {
                if (!document.body.contains(modal)) {
                    document.removeEventListener('keydown', keyHandler);
                    observer.disconnect();
                }
            });
            observer.observe(document.body, { childList: true });
        });
    }
    
    // Start a brand new game (clears all state)
    async function startNewGame() {
        if (isResetting) {
            console.log('Already resetting, ignoring duplicate call');
            return;
        }
        
        isResetting = true;
        
        const newAgentCount = await promptAgentCount();
        if (newAgentCount === null) {
            isResetting = false;
            return;
        }
        
        currentAgentCount = newAgentCount;
        document.getElementById('agentCountBadge').textContent = `Agents: ${currentAgentCount}`;
        
        const uniqueGameId = generateGameId();
        expectedNextGameId = uniqueGameId;
        currentGameId = uniqueGameId;
        document.getElementById('gameIdBadge').textContent = `Game: ${uniqueGameId.substring(0, 20)}...`;
        
        gameOver = false;
        currentWinner = null;
        
        const nextBtn = document.getElementById('nextCycleBtn');
        nextBtn.disabled = false;
        nextBtn.style.opacity = '1';
        nextBtn.title = 'Advance to next cycle';
        
        const nudgeUpBtn = document.getElementById('nudgeUpBtn');
        const nudgeDownBtn = document.getElementById('nudgeDownBtn');
        const nudgeAgentSelect = document.getElementById('nudgeAgentSelect');
        const nudgeTraitSelect = document.getElementById('nudgeTraitSelect');
        nudgeUpBtn.disabled = false;
        nudgeDownBtn.disabled = false;
        nudgeAgentSelect.disabled = false;
        nudgeTraitSelect.disabled = false;
        
        showToast('Starting fresh game...');
        
        if (ws && ws.readyState === WebSocket.OPEN) {
            console.log(`Creating NEW private game with ID: ${uniqueGameId}, Agents: ${currentAgentCount}`);
            ws.send(JSON.stringify({ 
                type: 'join_game', 
                gameId: uniqueGameId, 
                createNew: true, 
                n: currentAgentCount
            }));
        } else {
            console.warn('Cannot create new game - WebSocket not connected, reconnecting...');
            connect();
        }
        
        setTimeout(() => {
            isResetting = false;
        }, 1000);
    }
    
    function handleGameOver(winner) {
        if (gameOver) return;
        if (isResetting) return;
        
        gameOver = true;
        currentWinner = winner;
        
        const nextBtn = document.getElementById('nextCycleBtn');
        nextBtn.disabled = true;
        nextBtn.style.opacity = '0.5';
        
        const nudgeUpBtn = document.getElementById('nudgeUpBtn');
        const nudgeDownBtn = document.getElementById('nudgeDownBtn');
        const nudgeAgentSelect = document.getElementById('nudgeAgentSelect');
        const nudgeTraitSelect = document.getElementById('nudgeTraitSelect');
        nudgeUpBtn.disabled = true;
        nudgeDownBtn.disabled = true;
        nudgeAgentSelect.disabled = true;
        nudgeTraitSelect.disabled = true;
        
        alert(`GAME OVER! ${winner.toUpperCase()} WINS!\n\nClick OK to start a fresh game.`);
        
        startNewGame();
    }
    
    function connect() {
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.close();
        }
        
        const wsUrl = `wss://edgemafia-neural.onrender.com`;
        console.log('Connecting to WebSocket:', wsUrl);
        
        ws = new WebSocket(wsUrl);
        
        ws.onopen = async () => {
            document.getElementById('status').innerHTML = '<span class="connected">●</span> Connected';
            
            currentAgentCount = await promptAgentCount();
            if (currentAgentCount === null) currentAgentCount = 20;
            document.getElementById('agentCountBadge').textContent = `Agents: ${currentAgentCount}`;
            
            const uniqueGameId = generateGameId();
            expectedNextGameId = uniqueGameId;
            currentGameId = uniqueGameId;
            document.getElementById('gameIdBadge').textContent = `Game: ${uniqueGameId.substring(0, 20)}...`;
            
            gameOver = false;
            currentWinner = null;
            isResetting = false;
            
            console.log(`Creating private game with ID: ${uniqueGameId}, Agents: ${currentAgentCount}`);
            ws.send(JSON.stringify({ 
                type: 'join_game', 
                gameId: uniqueGameId, 
                createNew: true, 
                n: currentAgentCount
            }));
        };
        
        ws.onmessage = (event) => {
            const msg = JSON.parse(event.data);
            
            if (msg.data && msg.data.gameId && expectedNextGameId && msg.data.gameId !== expectedNextGameId) {
                console.log(`Ignoring message from old game ${msg.data.gameId}, expecting ${expectedNextGameId}`);
                return;
            }
            
            if (msg.type === 'state') {
                if (msg.data.gameId === currentGameId || !expectedNextGameId) {
                    updateUI(msg.data);
                    if (msg.data.gameOver && !gameOver && !isResetting) {
                        handleGameOver(msg.data.winner || 'unknown');
                    }
                }
            }
            if (msg.type === 'cycle_complete') {
                if (msg.data.gameId === currentGameId && !isResetting) {
                    updateUI(msg.data);
                    if (msg.winner && !gameOver) {
                        handleGameOver(msg.winner);
                    }
                }
            }
            if (msg.type === 'nudge_ack') {
                console.log(`Nudge: ${msg.agentId} ${msg.trait} -> ${msg.newValue.toFixed(3)}`);
                showToast(`Nudged Agent ${msg.agentId}: ${msg.trait} → ${msg.newValue.toFixed(3)}`);
            }
        };
        
        ws.onclose = () => {
            document.getElementById('status').innerHTML = '<span class="disconnected">●</span> Disconnected - reconnecting...';
            setTimeout(connect, 3000);
        };
        
        ws.onerror = (err) => {
            console.error('WebSocket error:', err);
        };
    }
    
    function updateUI(state) {
        if (expectedNextGameId && state.gameId !== expectedNextGameId && state.gameId !== currentGameId) {
            return;
        }
        
        currentGameId = state.gameId;
        agents = state.agents;
        
        document.getElementById('cycle').textContent = state.cycle;
        document.getElementById('mafiaCount').textContent = state.mafiaAlive;
        document.getElementById('townCount').textContent = state.townAlive;
        document.getElementById('totalCount').textContent = state.agents.length;
        
        const tbody = document.getElementById('agentTable');
        tbody.innerHTML = '';
        
        const nudgeSelect = document.getElementById('nudgeAgentSelect');
        nudgeSelect.innerHTML = '';
        
        for (const agent of state.agents) {
            const row = tbody.insertRow();
            row.className = agent.alive ? '' : 'dead';
            
            row.insertCell(0).textContent = agent.id;
            row.insertCell(1).textContent = agent.name;
            row.insertCell(2).innerHTML = `<span class="${agent.role === 0 ? 'mafia' : 'town'}">${agent.roleName}</span>`;
            
            row.insertCell(3).innerHTML = renderTraitBar(agent.aggression);
            row.insertCell(4).innerHTML = renderTraitBar(agent.loyalty);
            row.insertCell(5).innerHTML = renderTraitBar(agent.paranoia);
            row.insertCell(6).innerHTML = renderTraitBar(agent.deceit);
            row.insertCell(7).innerHTML = agent.totalReward.toFixed(2);
            
            const nudgeCell = row.insertCell(8);
            const nudgeBtn = document.createElement('button');
            nudgeBtn.textContent = 'Nudge';
            nudgeBtn.style.fontSize = '11px';
            nudgeBtn.style.padding = '2px 5px';
            nudgeBtn.onclick = () => {
                document.getElementById('nudgeAgentSelect').value = agent.id;
            };
            nudgeCell.appendChild(nudgeBtn);
            
            const option = document.createElement('option');
            option.value = agent.id;
            option.textContent = `${agent.id}: ${agent.name} (${agent.roleName})`;
            nudgeSelect.appendChild(option);
        }
    }
    
    function renderTraitBar(value) {
        const percent = ((value + 1) / 2) * 100;
        const colorClass = value >= 0 ? 'positive' : 'negative';
        return `
            <div class="trait-bar">
                <div class="trait-fill ${colorClass}" style="width: ${percent}%"></div>
            </div>
            <span class="trait-value">${value.toFixed(2)}</span>
        `;
    }
    
    function nextCycle() {
        if (gameOver) {
            showToast('Game over! Starting new game...');
            startNewGame();
            return;
        }
        
        if (isResetting) {
            showToast('Please wait, resetting game...');
            return;
        }
        
        if (ws && ws.readyState === WebSocket.OPEN && currentGameId) {
            console.log('Requesting next cycle...');
            ws.send(JSON.stringify({ type: 'next_cycle' }));
        } else {
            console.warn('Cannot send next_cycle - WebSocket not connected');
            showToast('WebSocket disconnected. Reconnecting...');
            connect();
        }
    }
    
    function nudgeAgent(agentId, trait, delta) {
        if (gameOver) {
            showToast('Game is over! Start a new game to nudge agents.');
            return;
        }
        
        if (isResetting) {
            showToast('Please wait, game is resetting...');
            return;
        }
        
        if (ws && ws.readyState === WebSocket.OPEN && currentGameId) {
            ws.send(JSON.stringify({ type: 'nudge', agentId, trait, delta }));
            showToast(`Nudging Agent ${agentId}: ${trait} ${delta > 0 ? '+' : ''}${delta}`);
        } else {
            console.warn('Cannot send nudge - WebSocket not connected');
        }
    }
    
    // Enhanced controller polling with triggers and all buttons
    function pollGamepad() {
        const gamepads = navigator.getGamepads();
        const gp = gamepads[0];
        
        if (gp) {
            updateControllerOverlay(true);
            
            // Get trigger values (axes 2 and 3 on Xbox, or buttons 6/7)
            // Xbox triggers are typically axes 2 (left) and 3 (right)
            const leftTriggerValue = gp.axes[2] !== undefined ? gp.axes[2] : 0;
            const rightTriggerValue = gp.axes[3] !== undefined ? gp.axes[3] : 0;
            
            const leftTriggerPressed = leftTriggerValue > 0.3;
            const rightTriggerPressed = rightTriggerValue > 0.3;
            
            // A Button (index 0) - Next Cycle
            const aPressed = gp.buttons[0]?.pressed || false;
            if (aPressed && !lastA && !isPromptActive) {
                nextCycle();
                showToast('🎮 Next Cycle');
            }
            lastA = aPressed;
            
            // X Button (index 2) - Nudge +0.1
            const xPressed = gp.buttons[2]?.pressed || false;
            if (xPressed && !lastX && !isPromptActive) {
                const agentId = parseInt(document.getElementById('nudgeAgentSelect').value);
                const trait = document.getElementById('nudgeTraitSelect').value;
                if (!isNaN(agentId)) {
                    nudgeAgent(agentId, trait, 0.1);
                    showToast(`🎮 Nudge +0.1: ${trait}`);
                }
            }
            lastX = xPressed;
            
            // Y Button (index 3) - Nudge -0.1 (NEW)
            const yPressed = gp.buttons[3]?.pressed || false;
            if (yPressed && !lastY && !isPromptActive) {
                const agentId = parseInt(document.getElementById('nudgeAgentSelect').value);
                const trait = document.getElementById('nudgeTraitSelect').value;
                if (!isNaN(agentId)) {
                    nudgeAgent(agentId, trait, -0.1);
                    showToast(`🎮 Nudge -0.1: ${trait}`);
                }
            }
            lastY = yPressed;
            
            // B Button (index 1) - New Game (NEW)
            const bPressed = gp.buttons[1]?.pressed || false;
            if (bPressed && !lastB && !isPromptActive) {
                showToast('🎮 Starting new game...');
                startNewGame();
            }
            lastB = bPressed;
            
            // Left Trigger - Only active during prompt
            if (leftTriggerPressed && !lastLeftTrigger && isPromptActive) {
                // Simulate click on minus button in modal if it exists
                const minusBtn = document.getElementById('modalMinusBtn');
                if (minusBtn) {
                    minusBtn.click();
                    showToast('🎮 -10 agents');
                }
            }
            lastLeftTrigger = leftTriggerPressed;
            
            // Right Trigger - Only active during prompt
            if (rightTriggerPressed && !lastRightTrigger && isPromptActive) {
                // Simulate click on plus button in modal if it exists
                const plusBtn = document.getElementById('modalPlusBtn');
                if (plusBtn) {
                    plusBtn.click();
                    showToast('🎮 +10 agents');
                }
            }
            lastRightTrigger = rightTriggerPressed;
            
        } else {
            updateControllerOverlay(false);
        }
    }
    
    document.getElementById('nextCycleBtn').onclick = nextCycle;
    document.getElementById('newGameBtn').onclick = () => startNewGame();
    document.getElementById('nudgeUpBtn').onclick = () => {
        const agentId = parseInt(document.getElementById('nudgeAgentSelect').value);
        const trait = document.getElementById('nudgeTraitSelect').value;
        if (!isNaN(agentId)) nudgeAgent(agentId, trait, 0.1);
    };
    document.getElementById('nudgeDownBtn').onclick = () => {
        const agentId = parseInt(document.getElementById('nudgeAgentSelect').value);
        const trait = document.getElementById('nudgeTraitSelect').value;
        if (!isNaN(agentId)) nudgeAgent(agentId, trait, -0.1);
    };
    
    window.addEventListener('gamepadconnected', (e) => {
        console.log('Gamepad connected:', e.gamepad.id);
        showToast(`🎮 ${e.gamepad.id} connected!`);
        updateControllerOverlay(true);
        if (!gamepadInterval) {
            gamepadInterval = setInterval(pollGamepad, 100);
        }
    });
    
    window.addEventListener('gamepaddisconnected', (e) => {
        console.log('Gamepad disconnected');
        showToast('🎮 Controller disconnected');
        updateControllerOverlay(false);
        if (gamepadInterval && !navigator.getGamepads().some(g => g)) {
            clearInterval(gamepadInterval);
            gamepadInterval = null;
        }
    });
    
    // Start polling anyway (will detect when controller connects)
    gamepadInterval = setInterval(pollGamepad, 100);
    
    connect();
</script>
</body>
</html>
