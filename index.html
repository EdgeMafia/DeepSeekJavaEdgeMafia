<!DOCTYPE html>
<html>
<head>
    <title>EdgeMafia - Pure AI Mafia Game</title>
    <style>
        * { box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #0f0;
            font-family: 'Courier New', monospace;
            margin: 0;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        
        .hud {
            background: #000;
            border: 2px solid #0f0;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
        }
        
        .title-section {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 1px solid #0f0;
            padding-bottom: 10px;
        }
        
        .main-title {
            font-size: 48px;
            font-weight: bold;
            letter-spacing: 4px;
            color: #0f0;
            text-shadow: 0 0 10px #0f0;
        }
        
        .subtitle {
            font-size: 14px;
            color: #888;
            letter-spacing: 2px;
        }
        
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #333;
        }
        .stat {
            background: #111;
            padding: 8px 15px;
            border-radius: 5px;
        }
        .stat-label { color: #888; font-size: 12px; }
        .stat-value { font-size: 24px; font-weight: bold; }
        .mafia { color: #f00; }
        .town { color: #0f0; }
        
        .agent-table {
            width: 100%;
            border-collapse: collapse;
        }
        .agent-table th, .agent-table td {
            padding: 8px;
            text-align: left;
            border-bottom: 1px solid #333;
        }
        .agent-table th { background: #111; color: #0f0; }
        .agent-table tr:hover { background: #111; }
        .dead { opacity: 0.4; }
        
        .trait-bar {
            width: 80px;
            height: 16px;
            background: #222;
            border-radius: 3px;
            overflow: hidden;
            display: inline-block;
        }
        .trait-fill {
            height: 100%;
            transition: width 0.2s;
        }
        .trait-fill.positive { background: #0f0; }
        .trait-fill.negative { background: #f00; }
        .trait-value { font-size: 11px; margin-left: 5px; }
        
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        button {
            background: #0f0;
            color: #000;
            border: none;
            padding: 10px 20px;
            font-family: monospace;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.2s ease;
        }
        button:hover { background: #0a0; transform: scale(1.02); }
        button:disabled {
            background: #333;
            color: #666;
            cursor: not-allowed;
            transform: none;
        }
        .nudge-group {
            background: #111;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
        }
        select, input {
            background: #222;
            color: #0f0;
            border: 1px solid #0f0;
            padding: 5px;
            font-family: monospace;
        }
        
        .status {
            position: fixed;
            top: 10px;
            right: 10px;
            background: #000;
            border: 1px solid #0f0;
            padding: 5px 10px;
            font-size: 12px;
            border-radius: 5px;
        }
        .connected { color: #0f0; }
        .disconnected { color: #f00; }
        
        .game-id-badge {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: #000;
            border: 1px solid #333;
            padding: 4px 8px;
            font-size: 10px;
            color: #666;
            border-radius: 5px;
            font-family: monospace;
        }
        
        .agent-count-badge {
            position: fixed;
            bottom: 10px;
            left: 10px;
            background: #000;
            border: 1px solid #333;
            padding: 4px 8px;
            font-size: 10px;
            color: #666;
            border-radius: 5px;
            font-family: monospace;
        }
        
        .game-over-badge {
            position: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: #f00;
            color: #fff;
            padding: 5px 15px;
            font-size: 12px;
            font-weight: bold;
            border-radius: 20px;
            font-family: monospace;
            animation: pulse 1s infinite;
            pointer-events: none;
            z-index: 1000;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; background: #f00; }
            50% { opacity: 0.7; background: #800; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="hud">
        <div class="title-section">
            <div class="main-title">EDGEMAFIA</div>
            <div class="subtitle">by Aston Walker</div>
        </div>
        
        <div class="stats">
            <div class="stat">
                <div class="stat-label">CYCLE</div>
                <div class="stat-value" id="cycle">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">MAFIA</div>
                <div class="stat-value mafia" id="mafiaCount">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">TOWN</div>
                <div class="stat-value town" id="townCount">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">TOTAL</div>
                <div class="stat-value" id="totalCount">0</div>
            </div>
        </div>
        
        <table class="agent-table">
            <thead>
                <tr><th>ID</th><th>NAME</th><th>ROLE</th><th>AGG</th><th>LOY</th><th>PAR</th><th>DEC</th><th>REWARD</th><th>NUDGE</th></tr>
            </thead>
            <tbody id="agentTable"></tbody>
        </table>
        
        <div class="controls">
            <button id="nextCycleBtn">▶ NEXT CYCLE</button>
            <button id="newGameBtn">🔄 NEW GAME</button>
        </div>
        
        <div class="nudge-group">
            <strong>NUDGE SELECTED AGENT:</strong>
            <select id="nudgeAgentSelect"></select>
            <select id="nudgeTraitSelect">
                <option value="aggression">Aggression</option>
                <option value="loyalty">Loyalty</option>
                <option value="paranoia">Paranoia</option>
                <option value="deceit">Deceit</option>
            </select>
            <button id="nudgeUpBtn">+0.1</button>
            <button id="nudgeDownBtn">-0.1</button>
            <span style="margin-left: 10px; font-size: 12px;">(Or use Gamepad: A=next, X=nudge+)</span>
        </div>
    </div>
</div>

<div class="status" id="status">
    <span class="disconnected">●</span> Disconnected
</div>
<div class="game-id-badge" id="gameIdBadge">Game: ---</div>
<div class="agent-count-badge" id="agentCountBadge">Agents: ---</div>
<div id="gameOverBadge" style="display: none;" class="game-over-badge">🏆 GAME OVER 🏆</div>

<script>
    let ws = null;
    let currentGameId = null;
    let currentAgentCount = 20;
    let agents = [];
    let gameOver = false;
    let currentWinner = null;
    
    // Generate unique session ID for this player
    function generateGameId() {
        const timestamp = Date.now();
        const random = Math.random().toString(36).substring(2, 8);
        return `game_${timestamp}_${random}`;
    }
    
    // Prompt for agent count (called on first load and new game)
    function promptAgentCount() {
        let input = prompt('Number of AI agents per game (6-100):', '20');
        let count = parseInt(input);
        
        // Validate input
        if (isNaN(count)) {
            count = 20;
        } else if (count < 6) {
            alert('Minimum 6 agents. Using 6.');
            count = 6;
        } else if (count > 100) {
            alert('Maximum 100 agents. Using 100.');
            count = 100;
        }
        
        return count;
    }
    
    // Update UI based on game over state
    function setGameOverState(isGameOver, winner = null) {
        gameOver = isGameOver;
        currentWinner = winner;
        const nextBtn = document.getElementById('nextCycleBtn');
        const nudgeUpBtn = document.getElementById('nudgeUpBtn');
        const nudgeDownBtn = document.getElementById('nudgeDownBtn');
        const nudgeAgentSelect = document.getElementById('nudgeAgentSelect');
        const nudgeTraitSelect = document.getElementById('nudgeTraitSelect');
        const gameOverBadge = document.getElementById('gameOverBadge');
        
        if (isGameOver) {
            nextBtn.disabled = true;
            nextBtn.style.opacity = '0.5';
            nextBtn.title = 'Game over - click NEW GAME';
            nudgeUpBtn.disabled = true;
            nudgeDownBtn.disabled = true;
            nudgeAgentSelect.disabled = true;
            nudgeTraitSelect.disabled = true;
            gameOverBadge.style.display = 'block';
            gameOverBadge.textContent = `🏆 GAME OVER - ${winner ? winner.toUpperCase() : 'UNKNOWN'} WINS! 🏆`;
        } else {
            nextBtn.disabled = false;
            nextBtn.style.opacity = '1';
            nextBtn.title = 'Advance to next cycle';
            nudgeUpBtn.disabled = false;
            nudgeDownBtn.disabled = false;
            nudgeAgentSelect.disabled = false;
            nudgeTraitSelect.disabled = false;
            gameOverBadge.style.display = 'none';
        }
    }
    
    function connect() {
        // Hardcoded Render backend URL
        const wsUrl = `wss://edgemafia-neural.onrender.com`;
        console.log('Connecting to WebSocket:', wsUrl);
        
        ws = new WebSocket(wsUrl);
        
        ws.onopen = () => {
            document.getElementById('status').innerHTML = '<span class="connected">●</span> Connected';
            
            // PROMPT FOR AGENT COUNT ON FIRST LOAD
            currentAgentCount = promptAgentCount();
            document.getElementById('agentCountBadge').textContent = `Agents: ${currentAgentCount}`;
            
            // Generate unique game ID for this player
            const uniqueGameId = generateGameId();
            currentGameId = uniqueGameId;
            document.getElementById('gameIdBadge').textContent = `Game: ${uniqueGameId.substring(0, 20)}...`;
            
            // Reset game over state
            setGameOverState(false, null);
            
            console.log(`Creating private game with ID: ${uniqueGameId}, Agents: ${currentAgentCount}`);
            ws.send(JSON.stringify({ 
                type: 'join_game', 
                gameId: uniqueGameId, 
                createNew: true, 
                n: currentAgentCount
            }));
        };
        
        ws.onmessage = (event) => {
            const msg = JSON.parse(event.data);
            if (msg.type === 'state') {
                updateUI(msg.data);
                // Sync game over state from server
                if (msg.data.gameOver) {
                    setGameOverState(true, msg.data.winner);
                }
            }
            if (msg.type === 'cycle_complete') {
                updateUI(msg.data);
                if (msg.winner) {
                    setGameOverState(true, msg.winner);
                    alert(`GAME OVER! ${msg.winner.toUpperCase()} WINS!\n\nClick OK to acknowledge, then press NEW GAME to start another simulation.`);
                } else {
                    // Ensure button is enabled if game is not over
                    if (!gameOver) {
                        setGameOverState(false, null);
                    }
                }
            }
            if (msg.type === 'nudge_ack') {
                console.log(`Nudge: ${msg.agentId} ${msg.trait} -> ${msg.newValue.toFixed(3)}`);
                // Refresh state after nudge
                if (ws && ws.readyState === WebSocket.OPEN && currentGameId) {
                    ws.send(JSON.stringify({ type: 'join_game', gameId: currentGameId, loadExisting: true, n: currentAgentCount }));
                }
            }
        };
        
        ws.onclose = () => {
            document.getElementById('status').innerHTML = '<span class="disconnected">●</span> Disconnected - reconnecting...';
            setTimeout(connect, 3000);
        };
        
        ws.onerror = (err) => {
            console.error('WebSocket error:', err);
        };
    }
    
    function updateUI(state) {
        currentGameId = state.gameId;
        agents = state.agents;
        
        document.getElementById('cycle').textContent = state.cycle;
        document.getElementById('mafiaCount').textContent = state.mafiaAlive;
        document.getElementById('townCount').textContent = state.townAlive;
        document.getElementById('totalCount').textContent = state.agents.length;
        
        const tbody = document.getElementById('agentTable');
        tbody.innerHTML = '';
        
        const nudgeSelect = document.getElementById('nudgeAgentSelect');
        nudgeSelect.innerHTML = '';
        
        for (const agent of state.agents) {
            const row = tbody.insertRow();
            row.className = agent.alive ? '' : 'dead';
            
            row.insertCell(0).textContent = agent.id;
            row.insertCell(1).textContent = agent.name;
            row.insertCell(2).innerHTML = `<span class="${agent.role === 0 ? 'mafia' : 'town'}">${agent.roleName}</span>`;
            
            row.insertCell(3).innerHTML = renderTraitBar(agent.aggression);
            row.insertCell(4).innerHTML = renderTraitBar(agent.loyalty);
            row.insertCell(5).innerHTML = renderTraitBar(agent.paranoia);
            row.insertCell(6).innerHTML = renderTraitBar(agent.deceit);
            row.insertCell(7).innerHTML = agent.totalReward.toFixed(2);
            
            const nudgeCell = row.insertCell(8);
            const nudgeBtn = document.createElement('button');
            nudgeBtn.textContent = 'Nudge';
            nudgeBtn.style.fontSize = '11px';
            nudgeBtn.style.padding = '2px 5px';
            nudgeBtn.onclick = () => {
                document.getElementById('nudgeAgentSelect').value = agent.id;
            };
            nudgeCell.appendChild(nudgeBtn);
            
            const option = document.createElement('option');
            option.value = agent.id;
            option.textContent = `${agent.id}: ${agent.name} (${agent.roleName})`;
            nudgeSelect.appendChild(option);
        }
    }
    
    function renderTraitBar(value) {
        const percent = ((value + 1) / 2) * 100;
        const colorClass = value >= 0 ? 'positive' : 'negative';
        return `
            <div class="trait-bar">
                <div class="trait-fill ${colorClass}" style="width: ${percent}%"></div>
            </div>
            <span class="trait-value">${value.toFixed(2)}</span>
        `;
    }
    
    function nextCycle() {
        if (gameOver) {
            alert('Game is already over! Click NEW GAME to start a fresh simulation.');
            return;
        }
        
        if (ws && ws.readyState === WebSocket.OPEN && currentGameId) {
            console.log('Requesting next cycle...');
            ws.send(JSON.stringify({ type: 'next_cycle' }));
        } else {
            console.warn('Cannot send next_cycle - WebSocket not connected');
            alert('WebSocket disconnected. Reconnecting...');
            connect();
        }
    }
    
    function nudgeAgent(agentId, trait, delta) {
        if (gameOver) {
            alert('Game is over! Start a new game to nudge agents.');
            return;
        }
        
        if (ws && ws.readyState === WebSocket.OPEN && currentGameId) {
            ws.send(JSON.stringify({ type: 'nudge', agentId, trait, delta }));
        } else {
            console.warn('Cannot send nudge - WebSocket not connected');
        }
    }
    
    function newGame() {
        // PROMPT FOR AGENT COUNT ON NEW GAME
        const newAgentCount = promptAgentCount();
        if (newAgentCount === null) return;
        
        currentAgentCount = newAgentCount;
        document.getElementById('agentCountBadge').textContent = `Agents: ${currentAgentCount}`;
        
        const uniqueGameId = generateGameId();
        currentGameId = uniqueGameId;
        document.getElementById('gameIdBadge').textContent = `Game: ${uniqueGameId.substring(0, 20)}...`;
        
        // Reset game over state
        setGameOverState(false, null);
        
        if (ws && ws.readyState === WebSocket.OPEN) {
            console.log(`Creating NEW private game with ID: ${uniqueGameId}, Agents: ${currentAgentCount}`);
            ws.send(JSON.stringify({ 
                type: 'join_game', 
                gameId: uniqueGameId, 
                createNew: true, 
                n: currentAgentCount
            }));
        } else {
            console.warn('Cannot create new game - WebSocket not connected, reconnecting...');
            connect();
        }
    }
    
    let gamepadInterval = null;
    let lastA = false;
    let lastX = false;
    
    function pollGamepad() {
        const gamepads = navigator.getGamepads();
        const gp = gamepads[0];
        if (gp && gp.buttons) {
            const aPressed = gp.buttons[0].pressed;
            if (aPressed && !lastA) {
                nextCycle();
            }
            lastA = aPressed;
            
            const xPressed = gp.buttons[2].pressed;
            if (xPressed && !lastX) {
                const agentId = parseInt(document.getElementById('nudgeAgentSelect').value);
                const trait = document.getElementById('nudgeTraitSelect').value;
                if (!isNaN(agentId)) {
                    nudgeAgent(agentId, trait, 0.1);
                }
            }
            lastX = xPressed;
        }
    }
    
    document.getElementById('nextCycleBtn').onclick = nextCycle;
    document.getElementById('newGameBtn').onclick = newGame;
    document.getElementById('nudgeUpBtn').onclick = () => {
        const agentId = parseInt(document.getElementById('nudgeAgentSelect').value);
        const trait = document.getElementById('nudgeTraitSelect').value;
        if (!isNaN(agentId)) nudgeAgent(agentId, trait, 0.1);
    };
    document.getElementById('nudgeDownBtn').onclick = () => {
        const agentId = parseInt(document.getElementById('nudgeAgentSelect').value);
        const trait = document.getElementById('nudgeTraitSelect').value;
        if (!isNaN(agentId)) nudgeAgent(agentId, trait, -0.1);
    };
    
    window.addEventListener('gamepadconnected', (e) => {
        console.log('Gamepad connected:', e.gamepad.id);
        if (!gamepadInterval) {
            gamepadInterval = setInterval(pollGamepad, 100);
        }
    });
    
    window.addEventListener('gamepaddisconnected', (e) => {
        console.log('Gamepad disconnected');
        if (gamepadInterval && !navigator.getGamepads().some(g => g)) {
            clearInterval(gamepadInterval);
            gamepadInterval = null;
        }
    });
    
    // Start the application
    connect();
</script>
</body>
</html>
